apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx3
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx3

  template:
    metadata:
      labels:
        app: nginx3

    spec:
      containers:
      - name: nginx3
        image: nginx:1.25
        ports:
        - containerPort: 80
