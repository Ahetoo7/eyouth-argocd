apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx4
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx4

  template:
    metadata:
      labels:
        app: nginx4

    spec:
      containers:
      - name: nginx4
        image: nginx:1.25
        ports:
        - containerPort: 80
