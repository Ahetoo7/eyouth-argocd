apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      serviceAccountName: jenkins

      containers:

      - name: jenkins
        image: michaelfawzy/jenkins-custom:latest
        imagePullPolicy: Always

        securityContext:
          runAsUser: 0

        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375

        ports:
        - containerPort: 8080
        - containerPort: 50000

        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"

      - name: dind
        image: docker:29-dind

        securityContext:
          privileged: true

        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""

        ports:
        - containerPort: 2375

      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-pvc
