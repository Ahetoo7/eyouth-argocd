apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx2
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx2

  template:
    metadata:
      labels:
        app: nginx2

    spec:
      containers:
      - name: nginx2
        image: nginx:1.26
        ports:
        - containerPort: 80
